name: Colorado Business Lawsuit Tracker
on:
  schedule:
    # 4:45am MST (Nov-Mar) = 11:45 UTC
    # 4:45am MDT (Mar-Nov) = 10:45 UTC
    - cron: '45 10 * * *'
    - cron: '45 11 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  deploy-first:
    runs-on: ubuntu-latest
    steps:
      - name: Check if this is the right hour for current DST
        id: dst_check
        run: |
          HOUR_MT=$(TZ=America/Denver date +%H)
          echo "Mountain Time hour: $HOUR_MT"
          if [ "$HOUR_MT" = "04" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Wrong hour for current DST - skipping"
          fi
      - name: Checkout repo
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Pull latest
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        run: git pull origin main
      - name: Setup Pages
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v4
      - name: Upload artifact
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v4

  scrape:
    needs: deploy-first
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check DST
        id: dst_check
        run: |
          HOUR_MT=$(TZ=America/Denver date +%H)
          if [ "$HOUR_MT" = "04" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
      - name: Checkout repo
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pull latest
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        run: git pull origin main
      - name: Set up Python
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run scraper
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        env:
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scraper.py
      - name: Commit and push data
        if: steps.dst_check.outputs.skip != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add lawsuit-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Lawsuit tracker update"
            git push --force
          fi

  deploy-after:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Pull latest data
        run: git pull origin main
      - name: Delete previous artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: github-pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
